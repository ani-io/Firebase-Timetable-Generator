<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Time-Table Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="text-center">
                <i class="bi bi-calendar3 text-primary" style="font-size: 48px;"></i>
                <h1 class="mt-3">CleriTime</h1>
                <p class="subtitle">Time-Table Management System</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    Sign In
                </button>
            </form>

            <!-- Loading Indicator -->
            <div id="loading" class="text-center mt-3" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="mb-2">Don't have an account? <a href="signup.html" class="text-primary fw-bold">Sign Up</a></p>
                <small class="text-muted">
                    <i class="bi bi-shield-lock"></i> Secure login with Firebase Authentication
                </small>
            </div>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-container">
                <p class="footer-copyright">
                    &copy; 2026 CleriTime. All rights reserved.
                </p>
                <p class="footer-dev-team">
                    Developed with <i class="bi bi-heart-fill text-danger text-white"></i> by <a href="developers.html" class="dev-names" style="text-decoration:none;">Our Development Team</a>
                </p>
                <div class="footer-badges">
                    <span class="footer-badge">
                        <i class="bi bi-fire"></i> Firebase
                    </span>
                    <span class="footer-badge">
                        <i class="bi bi-cpu"></i> Gemini AI
                    </span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
